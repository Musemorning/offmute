<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4200 700" role="img" aria-label="PM Off Mute, Dark PM Comedy. EXEC: What's the timeline? PM: What year works for you?">
  <!-- Off Mute LinkedIn cover. 4200x700 (6:1); renders ~1128x191.
       Editorial cream, not a green slab. Composition sits right-of-centre so
       the round company logo (bottom-left) never overlaps content. -->
  <defs>
    <style>
      .serif { font-family: Georgia, 'Liberation Serif', 'DejaVu Serif', 'Times New Roman', serif; }
      .sans  { font-family: 'DejaVu Sans', 'Liberation Sans', 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>

  <!-- paper -->
  <rect width="4200" height="700" fill="#F4EEE1"/>
  <!-- thin structural frame: green top rule, hairline bottom -->
  <rect x="0" y="0" width="4200" height="8" fill="#183D2B"/>
  <rect x="0" y="698" width="4200" height="2" fill="#B9AE96"/>

  <!-- ===== brand lockup ===== -->
  <text x="1704" y="256" class="serif" font-weight="700" font-size="50" letter-spacing="14" fill="#183D2B">PM</text>
  <rect x="1700" y="286" width="98" height="6" fill="#183D2B"/>
  <text x="1696" y="382" class="serif" font-weight="700" font-size="88" letter-spacing="1" fill="#183D2B">Off Mute</text>
  <!-- witty mark: a fake trademark badge — ®-shaped, but it smiles back -->
  <g transform="translate(2092 320)" stroke="#183D2B" fill="#183D2B">
    <circle r="16" fill="none" stroke-width="3"/>
    <circle cx="-5.5" cy="-4" r="2.2"/>
    <circle cx="5.5" cy="-4" r="2.2"/>
    <path d="M-7 4 a7 7 0 0 0 14 0" fill="none" stroke-width="2.6" stroke-linecap="round"/>
  </g>
  <text x="1700" y="442" class="sans" font-weight="600" font-size="29" letter-spacing="1" fill="#183D2B">Dark PM Comedy</text>

  <!-- gutter divider (echoes the app's transcript gutter) -->
  <rect x="2260" y="196" width="2" height="300" fill="#B9AE96"/>

  <!-- ===== riff transcript (hero) ===== -->
  <!-- row 1: prompt -->
  <text x="2476" y="300" text-anchor="end" class="sans" font-weight="600" font-size="24" letter-spacing="5" fill="#7C7568">EXEC</text>
  <text x="2520" y="300" class="serif" font-weight="400" font-size="86" fill="#1A1712">What&#8217;s the timeline?</text>
  <!-- row 2: comeback -->
  <text x="2476" y="470" text-anchor="end" class="sans" font-weight="600" font-size="24" letter-spacing="5" fill="#7C7568">PM</text>
  <text x="2520" y="470" class="serif" font-style="italic" font-weight="400" font-size="86" fill="#1A1712">What year works for you?</text>
</svg>
